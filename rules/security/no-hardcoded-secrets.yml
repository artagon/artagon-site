id: no-hardcoded-secrets
language: typescript
rule:
  any:
    # Double-quoted literals
    - pattern: const $NAME = "$SECRET"
    - pattern: let $NAME = "$SECRET"
    - pattern: var $NAME = "$SECRET"
    - pattern: $NAME = "$SECRET"
    # Single-quoted literals (TS quote-style is project-dependent)
    - pattern: const $NAME = '$SECRET'
    - pattern: let $NAME = '$SECRET'
    - pattern: var $NAME = '$SECRET'
    - pattern: $NAME = '$SECRET'
    # Template literals (no interpolation only — interpolated strings
    # often hide secrets too but require dataflow analysis ast-grep
    # doesn't do)
    - pattern: const $NAME = `$SECRET`
    - pattern: let $NAME = `$SECRET`
    - pattern: var $NAME = `$SECRET`
    - pattern: $NAME = `$SECRET`
constraints:
  SECRET:
    regex: "^(sk-[a-zA-Z0-9]{20,}|eyJ[a-zA-Z0-9_-]+\\.[a-zA-Z0-9_-]+\\.[a-zA-Z0-9_-]+)$"
message: "Potential hardcoded secret or JWT detected. Do not commit credentials or sensitive tokens directly in code. Use environment variables instead."
severity: error
