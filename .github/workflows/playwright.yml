name: Playwright Tests

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Default permissions for the workflow are read-only; jobs that need write
# scopes (visual-regression auto-commit) escalate explicitly.
permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  # Cancel only in-progress PR runs (rapid pushes); main and workflow_dispatch
  # runs complete to avoid interrupting snapshot commits or release workflows.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TOTAL_SHARDS: 5

# HOME=/root is set at the job level on each containerized job
# (test, visual-regression, accessibility) — NOT at workflow scope.
# Workflow-scope leaks into the non-container `merge-reports` job and
# action runner Docker calls, producing "/root/.docker/config.json:
# permission denied" warnings. Job-scope keeps the override surgical.
#
# Why HOME=/root in the first place: Firefox in
# mcr.microsoft.com/playwright refuses to launch when $HOME ownership
# doesn't match the running user (root inside the container vs. host
# UID on the bind-mounted workspace). /root is owned by uid 0, which
# matches the container's process UID. Documented as the official
# workaround in Playwright's own error message.

# All Playwright jobs run inside `mcr.microsoft.com/playwright:v1.59.1-jammy`
# (pinned by SHA256 digest), rather than `runs-on: ubuntu-latest` +
# `npx playwright install --with-deps`. Switching to the Microsoft-published
# Playwright image:
#   - eliminates a flaky 20-minute apt-get phase that hung CI on prior runs
#   - locks browser binary versions to the @playwright/test version (image tag
#     + digest MUST be bumped in lockstep with the npm dependency)
#   - drops both the playwright-cache step and the install step from each job
#
# Image pinning convention: all SHAs in this workflow (actions/checkout@SHA,
# actions/setup-node@SHA, etc.) are SHA-pinned to mitigate supply-chain
# drift. The container image follows the same rule via @sha256:... after
# the version tag.
#
# When updating @playwright/test:
#   1. Bump the npm dependency.
#   2. Re-resolve the image digest:
#        curl -s "https://mcr.microsoft.com/v2/playwright/manifests/v<X.Y.Z>-jammy" \
#          -H 'Accept: application/vnd.docker.distribution.manifest.list.v2+json' \
#          -D - | grep docker-content-digest
#   3. Update all three `container.image` lines below to the new tag@digest.
#   4. Verify with `npx playwright --version` inside the new container.

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy@sha256:8a0360d39d1973be506dd59002904a774f6d697d4946c94063b3fd006461c8ff
    env:
      HOME: /root
      # Enables tests/device-tour.spec.ts on every PR push. The spec
      # captures one above-the-fold PNG per playwright project and
      # attaches it via testInfo.attach() — no snapshot baseline,
      # purely artifact-only evidence. Adds ~15s per shard; reviewers
      # download the playwright-report-shard-* artifact zip to scan
      # device parity at a glance. To regenerate: re-run the workflow.
      DEVICE_TOUR: "1"
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      # The Microsoft Playwright image runs as root, but the checkout files
      # are owned by a different UID — git refuses to operate on the tree
      # by default ("fatal: detected dubious ownership"). Explicitly mark
      # the workspace as safe so npm scripts that shell out to git
      # (verify-prerequisites, lint-tokens, etc.) succeed.
      - name: Trust workspace inside container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The base mcr.microsoft.com/playwright image ships chromium /
      # firefox / webkit. Microsoft Edge (channel: msedge) and Google
      # Chrome stable (channel: chrome) are NOT included — both
      # playwright projects in playwright.config.ts target the OS-level
      # browser binaries. Install them before running tests so the
      # Edge/Chrome project shards don't fail with "Executable doesn't
      # exist". Both `npx playwright install <channel>` invocations are
      # idempotent and cached by the docker image's apt layer where
      # possible.
      - name: Install Microsoft Edge channel
        run: npx playwright install msedge

      - name: Install Google Chrome channel
        run: npx playwright install chrome

      - name: Build site
        run: npm run build

      # Run all node:test suites once on shard 1 only — the other shards are
      # for Playwright parallelism, not node:test (which runs in <2s and
      # would just N-tuple the cost). The umbrella `test:node` script covers
      # build-config, design-md-fixtures, lint-tokens, tweaks-{parse,state,
      # prod-noship}, and verify-{design-,}prerequisites.
      - name: Run node:test suites (shard 1 only)
        if: matrix.shard == 1
        run: npm run test:node

      # Run vitest unit suites once on shard 1 only — same rationale as
      # node:test. Discovery is the vitest config glob
      # `include: ["tests/**/*.test.mts"]` (see vitest.config.ts); the
      # current set covers data-collection tests + the full lint-* gate
      # family (path-citation, retired-token, source-comment-archive,
      # postbuild-chain-sync, etc.). Run `find tests -name '*.test.mts'`
      # for the live list — this comment is intentionally counter-free
      # so it doesn't drift each time a new gate lands.
      - name: Run vitest suites (shard 1 only)
        if: matrix.shard == 1
        run: npm run test:vitest

      - name: Run Playwright tests
        run: npm run test:ci -- --shard=${{ matrix.shard }}/${{ env.TOTAL_SHARDS }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-shard-${{ strategy.job-index }}
          path: .build/reports/playwright/html/
          retention-days: 14

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-screenshots-shard-${{ strategy.job-index }}
          path: .build/reports/playwright/results/
          retention-days: 7

  merge-reports:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: playwright-report-shard-*
          path: all-reports
          merge-multiple: true

      - name: Merge reports
        run: |
          npx playwright merge-reports --reporter html all-reports
        continue-on-error: true

      - name: Upload merged report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-merged
          path: .build/reports/playwright/html/
          retention-days: 14

  visual-regression:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy@sha256:8a0360d39d1973be506dd59002904a774f6d697d4946c94063b3fd006461c8ff
    env:
      HOME: /root
    # GitHub Actions does NOT support expressions in `permissions:` values
    # — must be static. The job-level grant is `contents: write`; ALL
    # write-effecting steps below are guarded by
    # `if: github.event_name == 'workflow_dispatch'` so PR pushes have
    # write capability available but never exercise it.
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      # The Microsoft Playwright image runs as root, but the checkout files
      # are owned by a different UID — git refuses to operate on the tree
      # by default ("fatal: detected dubious ownership"). Explicitly mark
      # the workspace as safe so npm scripts that shell out to git
      # (verify-prerequisites, lint-tokens, etc.) succeed.
      - name: Trust workspace inside container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # On PR/push: read-only comparison (asserts pixel parity, fails on diff).
      # On workflow_dispatch: --update-snapshots (rebases the baseline images).
      #
      # Two test files run under VISUAL_REGRESSION=1:
      #   - tests/vision-page.spec.ts          (test titles match "visual regression")
      #   - tests/styling-snapshots.spec.ts    (test titles like "midnight @ desktop")
      # The older grep `"visual regression"` only matched the first file, so
      # the styling-snapshots baseline never ran in CI. Pass the spec files
      # explicitly to cover both surfaces.
      #
      # `continue-on-error: true` on compare-only is INTENTIONAL until the
      # redesign change (`update-site-marketing-redesign`) lands — the
      # current vision-page tests reference selectors (`.three-domains`,
      # etc.) that ship with the redesign. Failure surface is the artifact
      # upload below, which reviewers inspect manually. Once the redesign
      # archives, drop `continue-on-error` so PR signal blocks on diffs.
      #
      # Baselines are Linux-pinned (Playwright names files `*-chromium-linux.png`
      # on ubuntu runners). Local darwin runs produce `*-chromium-darwin.png`
      # which are NOT authoritative — committed baselines come from this
      # workflow's `workflow_dispatch` --update-snapshots run only.
      # Cross-engine coverage: chromium catches the vast majority of
      # regressions, but webkit's text-rendering / color-mix evaluation
      # / focus-ring rendering all differ enough that a chromium-only
      # baseline misses Safari-class bugs. Mobile Safari extends that to
      # the touch + sub-1024 viewport surface. Adding them triples the
      # baseline storage cost — accepted for the engine-parity coverage.
      - name: Run visual regression tests (compare-only)
        if: github.event_name != 'workflow_dispatch'
        run: npx playwright test tests/vision-page.spec.ts tests/styling-snapshots.spec.ts --project=chromium --project=webkit --project="Mobile Safari"
        env:
          VISUAL_REGRESSION: "1"
        continue-on-error: true

      - name: Run visual regression tests (update snapshots)
        if: github.event_name == 'workflow_dispatch'
        run: npx playwright test tests/vision-page.spec.ts tests/styling-snapshots.spec.ts --project=chromium --project=webkit --project="Mobile Safari" --update-snapshots
        env:
          VISUAL_REGRESSION: "1"

      # Snapshot auto-commit ONLY on workflow_dispatch (manual trigger).
      # PR pushes never auto-commit; reviewers must intentionally update
      # baselines via the manual workflow. The job-level "Trust workspace
      # inside container" step (above) already handles safe.directory, so
      # this step only sets the bot identity before committing.
      - name: Commit updated snapshots
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/**/*-snapshots/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(ci): update Linux visual regression snapshots"
          git push || true

      - name: Upload visual diffs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: visual-regression-diffs
          path: .build/reports/playwright/results/
          retention-days: 7

  accessibility:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy@sha256:8a0360d39d1973be506dd59002904a774f6d697d4946c94063b3fd006461c8ff
    env:
      HOME: /root
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      # The Microsoft Playwright image runs as root, but the checkout files
      # are owned by a different UID — git refuses to operate on the tree
      # by default ("fatal: detected dubious ownership"). Explicitly mark
      # the workspace as safe so npm scripts that shell out to git
      # (verify-prerequisites, lint-tokens, etc.) succeed.
      - name: Trust workspace inside container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # Run accessibility-tagged tests on chromium + webkit + Mobile
      # Safari. Most a11y regressions show up cross-engine identically
      # (focus-ring CSS, ARIA attribute parsing), but webkit + Mobile
      # Safari have historically diverged on focus-visible behaviour and
      # touch-driven focus management — the engine-spread is the cheap
      # belt-and-suspenders that catches a real subclass of bugs.
      - name: Run accessibility tests
        run: npx playwright test --grep "accessibility" --project=chromium --project=webkit --project="Mobile Safari"

      - name: Upload a11y results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: accessibility-failures
          path: .build/reports/playwright/results/
          retention-days: 7
