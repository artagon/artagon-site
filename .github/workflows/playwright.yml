name: Playwright Tests

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Default permissions for the workflow are read-only; jobs that need write
# scopes (visual-regression auto-commit) escalate explicitly.
permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  TOTAL_SHARDS: 3

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.x

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.x
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.x
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build site
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:ci -- --shard=${{ matrix.shard }}/3

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.x
        if: always()
        with:
          name: playwright-report-shard-${{ strategy.job-index }}
          path: .build/reports/playwright/html/
          retention-days: 14

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.x
        if: failure()
        with:
          name: playwright-screenshots-shard-${{ strategy.job-index }}
          path: .build/reports/playwright/results/
          retention-days: 7

  merge-reports:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.x
        with:
          pattern: playwright-report-shard-*
          path: all-reports
          merge-multiple: true

      - name: Merge reports
        run: |
          npx playwright merge-reports --reporter html all-reports
        continue-on-error: true

      - name: Upload merged report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.x
        if: always()
        with:
          name: playwright-report-merged
          path: .build/reports/playwright/html/
          retention-days: 14

  visual-regression:
    runs-on: ubuntu-latest
    # GitHub Actions does NOT support expressions in `permissions:` values
    # — must be static. The job-level grant is `contents: write`; ALL
    # write-effecting steps below are guarded by
    # `if: github.event_name == 'workflow_dispatch'` so PR pushes have
    # write capability available but never exercise it.
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.x

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.x
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.x
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      # On PR/push: read-only comparison (asserts pixel parity, fails on diff).
      # On workflow_dispatch: --update-snapshots (rebases the baseline images).
      - name: Run visual regression tests (compare-only)
        if: github.event_name != 'workflow_dispatch'
        run: npx playwright test --grep "visual regression" --project=chromium
        env:
          VISUAL_REGRESSION: "1"

      - name: Run visual regression tests (update snapshots)
        if: github.event_name == 'workflow_dispatch'
        run: npx playwright test --grep "visual regression" --project=chromium --update-snapshots
        env:
          VISUAL_REGRESSION: "1"

      # Snapshot auto-commit ONLY on workflow_dispatch (manual trigger).
      # PR pushes never auto-commit; reviewers must intentionally update
      # baselines via the manual workflow.
      - name: Commit updated snapshots
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/**/*-snapshots/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore(ci): update Linux visual regression snapshots"
          git push || true

      - name: Upload visual diffs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.x
        if: failure()
        with:
          name: visual-regression-diffs
          path: .build/reports/playwright/results/
          retention-days: 7

  accessibility:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.x

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.x
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.x
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Run accessibility tests
        run: npx playwright test --grep "accessibility" --project=chromium

      - name: Upload a11y results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.x
        if: failure()
        with:
          name: accessibility-failures
          path: .build/reports/playwright/results/
          retention-days: 7
