name: Design.md PR Diff Comment

on:
  pull_request:
    branches: [main]
    paths: [DESIGN.md]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run design.md diff (Phase 2.8)
        run: npm run diff:design > /tmp/diff-output.txt 2>&1 || true

      - name: Post diff as PR comment (Phase 2.8)
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diffFile = '/tmp/diff-output.txt';
            let diffContent = '';

            try {
              if (fs.existsSync(diffFile)) {
                diffContent = fs.readFileSync(diffFile, 'utf8');
              }
            } catch (e) {
              console.log('No diff output file');
            }

            if (!diffContent || !diffContent.trim()) {
              console.log('No changes in design.md');
              return;
            }

            const body = `### Design.md Changes\n\n\`\`\`\n${diffContent}\n\`\`\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Design.md Changes')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
              console.log(`Updated comment #${existingComment.id}`);
            } else {
              const newComment = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
              console.log(`Created comment #${newComment.data.id}`);
            }
