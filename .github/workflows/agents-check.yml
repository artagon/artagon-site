name: Agents folder check
on:
  pull_request: {}
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: agents-check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - name: Ensure required agent files exist
        run: |
          test -f .agents/AGENT_MANIFEST.yaml
          test -f .agents/llm-config.json
          test -f .agents/policies/guardrails.md
          test -f .agents/context/vision-and-roadmap-full.md
