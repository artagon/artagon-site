name: Link check (lychee)
on:
  pull_request: {}
  push:
    branches: ["main"]
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # `--base .` lets lychee resolve root-relative paths (e.g.
          # `/docs/guides/styling-guide.md` in archived openspec READMEs)
          # against the repo root. Without it, lychee errors on every
          # root-relative href because it has no origin to anchor against.
          args: --base . --config lychee.toml --no-progress --cache './**/*.md' './public/**/*.html' './src/**/*.astro'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
