name: Design.md Lint & AST-Grep Check

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run design.md lint (Phase 2.4)
        run: npm run lint:design

      - name: Run ast-grep checks (Phase 2.4)
        run: npm run lint:sg:ci

      - name: Check design drift (Phase 2.4)
        run: npm run check:design-drift

      # adopt-design-md-format Phase 7.4: verify openspec ordering. The
      # script exits 0 when update-site-marketing-redesign is archived
      # OR its in-flight tasks.md no longer references the old
      # new-design/extracted/DESIGN.md path. Fails loudly when the
      # ordering would silently regress.
      - name: Verify design-md prerequisites (Phase 7.4)
        run: npm run verify:design-prerequisites

      # update-site-marketing-redesign Phase 0.5: verify the styling
      # refactor's tokens, utility classes, and BaseLayout slot ABI are
      # available before USMR code lands. Exits 0 when
      # refactor-styling-architecture is archived OR its commit is an
      # ancestor of HEAD. Wired alongside design-md prerequisites so
      # both ordering gates run in the same CI step block.
      - name: Verify redesign prerequisites (USMR Phase 0.5)
        run: npm run verify:prerequisites
